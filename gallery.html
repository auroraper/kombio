<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombio Galerie</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(45deg, #1F1B1A 0%, #2F2725 66%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            margin: 20px 0 10px 0;
            font-size: 36px;
            color: white;
        }

        header p {
            margin: 0;
            opacity: 0.9;
            font-size: 16px;
            color: white;
        }

        .upload-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #FF0063;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 20px 60px;
        }

        .gallery-stats {
            text-align: center;
            margin-bottom: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .gallery-grid {
            columns: 4 200px;
            column-gap: 20px;
        }

        .gallery-item {
            background: #2F2725;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            break-inside: avoid;
            -webkit-column-break-inside: avoid;
            display: inline-block;
            width: 100%;
            margin-bottom: 25px;
            vetical-align: top;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
        }

        .gallery-item-info {
            padding: 16px 20px;
        }

        .gallery-item-name {
            font-weight: 600;
            color: white;
            margin: 0 0 6px 0;
            font-size: 15px;
        }

        .gallery-item-description {
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            margin: 0 0 10px 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .gallery-item-date {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.6);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #FF0063;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-photos {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255,255,255,0.7);
            display: none;
        }

        .no-photos-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .no-photos h2 {
            color: white;
            margin-bottom: 10px;
        }

        .error-msg {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
            display: none;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            text-align: center;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .lightbox-info {
            color: white;
            text-align: center;
            margin-top: 16px;
        }

        .lightbox-info h3 {
            margin: 0 0 6px;
            font-size: 18px;
        }

        .lightbox-info p {
            margin: 0;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            line-height: 1;
            transition: transform 0.2s;
        }

        .lightbox-close:hover {
            transform: scale(1.2);
        }
        @media (max-width: 768px) {
    .gallery-grid {
        columns: 2 150px;
        column-gap: 12px;
        }
    </style>
</head>
<body>

    <header>
        <img src="weisses_K.png" alt="Kombio Logo" style="max-width: 120px; height: auto;">
        <h1>Kombio Galerie</h1>
        <p>Teile deine Runde!</p>
        <a href="upload.html" class="upload-btn">Foto hochladen</a>
    </header>

    <div class="gallery-container">
        <div class="gallery-stats" id="stats"></div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Fotos werden geladen...</p>
        </div>

        <div class="no-photos" id="noPhotos">
            <div class="no-photos-icon">📭</div>
            <h2>Noch keine Fotos vorhanden</h2>
            <p>Sei der Erste und lade ein Foto hoch!</p>
            <a href="upload.html" class="upload-btn" style="margin-top: 20px;">Jetzt hochladen</a>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">×</span>
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="">
            <div class="lightbox-info">
                <h3 id="lightboxName"></h3>
                <p id="lightboxDescription"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {

        const SUPABASE_URL = 'https://buqhkvqtsnlnlwheotra.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1cWhrdnF0c25sbmx3aGVvdHJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODcwMTMsImV4cCI6MjA5NjY2MzAxM30.8jHH3O3vmmRFaV0BHBvjwmscDa9vvjzxcZvJrKerY3w';
        const TABLE_NAME = 'photos';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const galleryGrid = document.getElementById('galleryGrid');
        const loading = document.getElementById('loading');
        const noPhotos = document.getElementById('noPhotos');
        const errorMsg = document.getElementById('errorMsg');
        const stats = document.getElementById('stats');
        const lightbox = document.getElementById('lightbox');

        async function loadPhotos() {
            try {
                const { data: photos, error } = await supabase
                    .from(TABLE_NAME)
                    .select('*')
                    .order('upload_date', { ascending: false });

                if (error) throw error;

                loading.style.display = 'none';

                if (!photos || photos.length === 0) {
                    noPhotos.style.display = 'block';
                    return;
                }

                stats.textContent = `${photos.length} Foto${photos.length !== 1 ? 's' : ''} in der Galerie`;

                photos.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.onclick = () => openLightbox(photo);

                    const date = new Date(photo.upload_date).toLocaleDateString('de-DE', {
                        day: '2-digit',
                        month: 'long',
                        year: 'numeric'
                    });

                    item.innerHTML = `
                        <img src="${photo.photo_url}" alt="${photo.photo_description || 'Foto'}" loading="lazy">
                        <div class="gallery-item-info">
                            <h3 class="gallery-item-name">${photo.submitter_name || 'Anonym'}</h3>
                            ${photo.photo_description ? `<p class="gallery-item-description">${photo.photo_description}</p>` : ''}
                            <span class="gallery-item-date"> ${date}</span>
                        </div>
                    `;

                    galleryGrid.appendChild(item);
                });

            } catch (error) {
                console.error('Fehler beim Laden:', error);
                loading.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = `❌ Fehler beim Laden der Fotos: ${error.message}`;
            }
        }

        function openLightbox(photo) {
            document.getElementById('lightboxImage').src = photo.photo_url;
            document.getElementById('lightboxName').textContent = photo.submitter_name || 'Anonym';
            document.getElementById('lightboxDescription').textContent = photo.photo_description || '';
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.closeLightbox = closeLightbox;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        loadPhotos();
    });
    </script>
</body>
</html>
