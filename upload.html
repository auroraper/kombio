<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Upload</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            color: #521E12;
        }

        body {
            background: #FF0063;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin: 0 0 30px 0;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            color: #521E12;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #FF0063;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .camera-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .camera-btn {
            flex: 1;
            padding: 16px;
            border: 2px solid #521E12;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .camera-btn:hover {
            background: rgba(82, 30, 18, 0.1);
        }

        .camera-btn .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .camera-btn .text {
            font-size: 13px;
            font-weight: 600;
        }

        .camera-btn input {
            display: none;
        }

        .or-divider {
            text-align: center;
            margin: 12px 0;
            color: #999;
            font-size: 13px;
        }

        .file-upload {
            position: relative;
            width: 100%;
            padding: 35px 20px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            background: #fafafa;
            transition: all 0.2s;
        }

        .file-upload:hover,
        .file-upload.dragover {
            border-color: #FF0063;
            background: rgba(255, 0, 99, 0.05);
        }

        .file-upload input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .file-upload-text {
            color: #666;
            font-size: 14px;
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #FF0063;
            font-weight: 500;
        }

        .preview-container {
            margin-top: 15px;
            display: none;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 8px;
            display: block;
        }

        .confirm-buttons {
            display: none;
            gap: 10px;
            margin-top: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            color: white;
        }

        .confirm-btn.accept { background: #28a745; }
        .confirm-btn.accept:hover { background: #218838; }
        .confirm-btn.reject { background: #dc3545; }
        .confirm-btn.reject:hover { background: #c82333; }

        .submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background: #521E12;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(82, 30, 18, 0.4);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .submit-btn.hidden {
            display: none;
        }

        .message {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .gallery-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .gallery-link a {
            color: #521E12;
            text-decoration: none;
            font-weight: 500;
        }

        .gallery-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">

        <div style="text-align: center; margin-bottom: 25px;">
            <img src="KOMBIO.png" alt="Kombio Logo" style="max-width: 150px; height: auto;">
        </div>

        <h1>Teile deinen Kombio Moment</h1>

        <div class="message success" id="successMsg">
            ✅ Vielen Dank! Dein Foto wurde erfolgreich hochgeladen.
        </div>
        <div class="message error" id="errorMsg">
            ❌ Es gab einen Fehler. Bitte versuche es erneut.
        </div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="name">Dein Name</label>
                <input type="text" id="name" name="name" placeholder="Max Mustermann">
            </div>

            <div class="form-group">
                <label for="description">Beschreibung</label>
                <textarea id="description" name="description" placeholder="Erzähle von deinem Kombio Moment..."></textarea>
            </div>

            <div class="form-group">
                <label>Foto aufnehmen oder auswählen</label>

                <div class="camera-buttons">
                    <label class="camera-btn">
                        <div class="icon">📷</div>
                        <div class="text">Kamera</div>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment">
                    </label>
                    <label class="camera-btn">
                        <div class="icon">🤳</div>
                        <div class="text">Selfie</div>
                        <input type="file" id="selfieInput" accept="image/*" capture="user">
                    </label>
                </div>

                <div class="or-divider">— oder —</div>

                <div class="file-upload" id="fileUpload">
                    <input type="file" id="photo" name="photo" accept="image/*">
                    <div class="file-upload-icon">🖼️</div>
                    <div class="file-upload-text">Aus Galerie wählen oder Bild hineinziehen</div>
                    <div class="file-name" id="fileName"></div>
                </div>

                <div class="preview-container" id="previewContainer">
                    <img id="previewImage" src="" alt="Vorschau">
                    <div class="confirm-buttons" id="confirmButtons">
                        <button type="button" class="confirm-btn accept" id="confirmPhoto">✓ Foto verwenden</button>
                        <button type="button" class="confirm-btn reject" id="retakePhoto">✗ Neues Foto</button>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn hidden">Foto hochladen</button>
        </form>

        <div class="gallery-link">
            <a href="gallery.html">Zur Kombio Galerie</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

        const SUPABASE_URL = 'https://buqhkvqtsnlnlwheotra.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1cWhrdnF0c25sbmx3aGVvdHJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODcwMTMsImV4cCI6MjA5NjY2MzAxM30.8jHH3O3vmmRFaV0BHBvjwmscDa9vvjzxcZvJrKerY3w';
        const BUCKET_NAME = 'galerie';
        const TABLE_NAME = 'photos';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const fileInput = document.getElementById('photo');
        const cameraInput = document.getElementById('cameraInput');
        const selfieInput = document.getElementById('selfieInput');
        const fileName = document.getElementById('fileName');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const fileUpload = document.getElementById('fileUpload');
        const confirmButtons = document.getElementById('confirmButtons');
        const confirmPhoto = document.getElementById('confirmPhoto');
        const retakePhoto = document.getElementById('retakePhoto');

        let selectedFile = null;
        let photoConfirmed = false;

        function showPreview(file) {
            selectedFile = file;
            photoConfirmed = false;
            fileName.textContent = file.name;

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
                confirmButtons.style.display = 'flex';
                submitBtn.classList.add('hidden');
                previewContainer.style.border = 'none';
                previewContainer.style.padding = '0';
            };
            reader.readAsDataURL(file);
        }

        [fileInput, cameraInput, selfieInput].forEach(input => {
            input.addEventListener('change', (e) => {
                if (e.target.files[0]) showPreview(e.target.files[0]);
            });
        });

        confirmPhoto.addEventListener('click', () => {
            photoConfirmed = true;
            confirmButtons.style.display = 'none';
            submitBtn.classList.remove('hidden');
            previewContainer.style.border = '3px solid #28a745';
            previewContainer.style.borderRadius = '12px';
            previewContainer.style.padding = '10px';
        });

        retakePhoto.addEventListener('click', () => {
            selectedFile = null;
            photoConfirmed = false;
            previewContainer.style.display = 'none';
            previewContainer.style.border = 'none';
            previewContainer.style.padding = '0';
            confirmButtons.style.display = 'none';
            submitBtn.classList.add('hidden');
            fileName.textContent = '';
            [fileInput, cameraInput, selfieInput].forEach(i => i.value = '');
        });

        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('dragover');
        });
        fileUpload.addEventListener('dragleave', () => fileUpload.classList.remove('dragover'));
        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('dragover');
            if (e.dataTransfer.files.length) showPreview(e.dataTransfer.files[0]);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile || !photoConfirmed) {
                alert('Bitte wähle ein Foto aus und bestätige es.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Wird hochgeladen...';
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();

            try {
                const fileExt = selectedFile.name.split('.').pop().toLowerCase();
                const uniqueName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

                const { error: uploadError } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(uniqueName, selectedFile, { cacheControl: '3600', upsert: false });

                if (uploadError) throw uploadError;

                const { data: urlData } = supabase.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(uniqueName);

                const { error: insertError } = await supabase
                    .from(TABLE_NAME)
                    .insert([{
                        submitter_name: name,
                        photo_description: description,
                        photo_url: urlData.publicUrl,
                        file_name: uniqueName,
                        upload_date: new Date().toISOString(),
                        moderation_status: 'new'
                    }]);

                if (insertError) throw insertError;

                successMsg.style.display = 'block';
                form.reset();
                previewContainer.style.display = 'none';
                previewContainer.style.border = 'none';
                previewContainer.style.padding = '0';
                confirmButtons.style.display = 'none';
                submitBtn.classList.add('hidden');
                fileName.textContent = '';
                selectedFile = null;
                photoConfirmed = false;

            } catch (error) {
                console.error('Upload-Fehler:', error);
                errorMsg.textContent = `❌ Fehler: ${error.message}`;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Foto hochladen';
            }
        });
     });        
    </script>
</body>
</html>
